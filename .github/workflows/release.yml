name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Store notarization credentials in the temp keychain
          xcrun notarytool store-credentials "CI-NOTARIZE" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --keychain "$KEYCHAIN_PATH"

      - name: Build signed and notarized DMG
        env:
          VERSION: ${{ env.VERSION }}
          SIGNING_IDENTITY: "Developer ID Application: VENKAT LUKSSHMAN TURLAPATI (36L722DZ7X)"
          KEYCHAIN_PROFILE: "CI-NOTARIZE"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: "true"
        run: chmod +x scripts/build-dmg.sh && ./scripts/build-dmg.sh

      - name: Rename artifact
        run: |
          mv "release/CMD+K-${{ env.VERSION }}-universal.dmg" "release/CMD+K-${{ env.VERSION }}-universal.dmg" || true

      - name: Generate checksum
        run: |
          cd release
          shasum -a 256 "CMD+K-${{ env.VERSION }}-universal.dmg" > "CMD+K-${{ env.VERSION }}-universal.dmg.sha256"

      - name: Copy updater artifacts
        run: |
          UPDATER_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          cp "$UPDATER_DIR"/CMD+K.app.tar.gz release/ 2>/dev/null || true
          cp "$UPDATER_DIR"/CMD+K.app.tar.gz.sig release/ 2>/dev/null || true
          # Verify the files exist
          ls -la release/CMD+K.app.tar.gz*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            release/CMD+K-*.dmg*
            release/CMD+K.app.tar.gz
            release/CMD+K.app.tar.gz.sig

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Sign Windows installer
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfxPath = "$env:RUNNER_TEMP\certificate.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          $exe = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" `
            sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /a $exe.FullName

      - name: Rename artifact
        shell: bash
        run: |
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          ORIG_EXE=$(ls "$NSIS_DIR"/*.exe | grep -v '.exe.sig' | head -1)
          ORIG_SIG="${ORIG_EXE}.sig"
          mv "$ORIG_EXE" "$NSIS_DIR/CMD+K-${{ env.VERSION }}-windows-x64.exe"
          if [ -f "$ORIG_SIG" ]; then
            mv "$ORIG_SIG" "$NSIS_DIR/CMD+K-${{ env.VERSION }}-windows-x64.exe.sig"
          fi

      - name: Generate checksum
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/nsis
          sha256sum "CMD+K-${{ env.VERSION }}-windows-x64.exe" > "CMD+K-${{ env.VERSION }}-windows-x64.exe.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/CMD+K-*.*

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Assemble latest.json
        run: |
          VERSION="${{ env.VERSION }}"
          REPO_URL="https://github.com/LakshmanTurlapati/Cmd-K/releases/download/v${VERSION}"

          # Read signatures
          SIG_MACOS=""
          if [ -f "artifacts/macos-dmg/CMD+K.app.tar.gz.sig" ]; then
            SIG_MACOS=$(cat "artifacts/macos-dmg/CMD+K.app.tar.gz.sig")
          fi

          SIG_WINDOWS=""
          if [ -f "artifacts/windows-installer/CMD+K-${VERSION}-windows-x64.exe.sig" ]; then
            SIG_WINDOWS=$(cat "artifacts/windows-installer/CMD+K-${VERSION}-windows-x64.exe.sig")
          fi

          cat > artifacts/latest.json <<EOF
          {
            "version": "${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_MACOS}",
                "url": "${REPO_URL}/CMD+K.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG_MACOS}",
                "url": "${REPO_URL}/CMD+K.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${SIG_WINDOWS}",
                "url": "${REPO_URL}/CMD+K-${VERSION}-windows-x64.exe"
              }
            }
          }
          EOF

          echo "latest.json contents:"
          cat artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## CMD+K ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Universal) | CMD+K-${{ env.VERSION }}-universal.dmg |
            | Windows (x64) | CMD+K-${{ env.VERSION }}-windows-x64.exe |

            ### Auto-Update

            Users on v0.2.7+ will receive this update automatically.

            ### Checksums (SHA256)

            See the `.sha256` files attached to this release.

            ---
            _Edit this release to add detailed release notes._
          files: |
            artifacts/macos-dmg/CMD+K-*.dmg*
            artifacts/macos-dmg/CMD+K.app.tar.gz
            artifacts/macos-dmg/CMD+K.app.tar.gz.sig
            artifacts/windows-installer/CMD+K-*.*
            artifacts/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
